<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Min-Conflit project environment</title>
  <desc id="desc">Architecture diagram showing the local workspace, Docker image, Flask runtime, solver modules, browser, and GitHub container publishing flow.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1440" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1A2030"/>
      <stop offset="1" stop-color="#111725"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.54 0 1 0 0 0.36 0 0 1 0 0.96 0 0 0 0.5 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11" stroke="#A6E3A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #F0F6FC; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #9FB0C8; }
      .card-title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #F0F6FC; }
      .chip { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #E6EAF2; }
      .body { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #D5DEEB; }
      .small { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #AAB8CC; }
      .mono { font: 600 16px Consolas, 'Courier New', monospace; fill: #DFF5F1; }
      .tiny { font: 600 13px Consolas, 'Courier New', monospace; fill: #D5DEEB; }
    </style>
  </defs>

  <rect width="1600" height="960" rx="28" fill="url(#bg)"/>
  <circle cx="220" cy="140" r="180" fill="#8B5CF6" opacity="0.08"/>
  <circle cx="1390" cy="840" r="220" fill="#5EEAD4" opacity="0.07"/>
  <circle cx="1290" cy="170" r="120" fill="#A6E3A1" opacity="0.05"/>

  <text x="88" y="92" class="title">Min-Conflit Project Environment</text>
  <text x="88" y="128" class="subtitle">Single-container Flask app for N-Queens and Sudoku, with a Docker build path and GitHub image publishing.</text>

  <rect x="76" y="180" width="420" height="286" rx="24" fill="url(#panel)" stroke="#324055" stroke-width="2"/>
  <rect x="98" y="206" width="126" height="34" rx="17" fill="#8B5CF6" opacity="0.2"/>
  <text x="126" y="228" class="chip">LOCAL USER</text>
  <text x="98" y="282" class="card-title">Developer machine</text>
  <rect x="98" y="312" width="176" height="120" rx="18" fill="#0F1522" stroke="#8B5CF6" stroke-width="2"/>
  <text x="118" y="348" class="body">VS Code</text>
  <text x="118" y="380" class="small">Container Tools</text>
  <text x="118" y="406" class="small">edit, build, logs</text>
  <rect x="292" y="312" width="176" height="120" rx="18" fill="#0F1522" stroke="#5EEAD4" stroke-width="2"/>
  <text x="312" y="348" class="body">Browser</text>
  <text x="312" y="380" class="small">landing page</text>
  <text x="312" y="406" class="small">solver UI</text>
  <text x="98" y="452" class="mono">docker build -t min-conflit:local .</text>
  <text x="98" y="480" class="mono">docker run -p 5000:5000 min-conflit:local</text>

  <rect x="540" y="180" width="520" height="286" rx="24" fill="url(#panel)" stroke="#324055" stroke-width="2"/>
  <rect x="562" y="206" width="142" height="34" rx="17" fill="#5EEAD4" opacity="0.18"/>
  <text x="590" y="228" class="chip">WORKSPACE</text>
  <text x="562" y="282" class="card-title">Repository contents</text>
  <rect x="562" y="312" width="218" height="122" rx="18" fill="#0F1522" stroke="#5EEAD4" stroke-width="2"/>
  <text x="582" y="346" class="body">Docker layer</text>
  <text x="582" y="376" class="mono">Dockerfile</text>
  <text x="582" y="402" class="tiny">FROM python:3.11-slim</text>
  <rect x="806" y="312" width="232" height="122" rx="18" fill="#0F1522" stroke="#8B5CF6" stroke-width="2"/>
  <text x="826" y="346" class="body">App layer</text>
  <text x="826" y="376" class="mono">app.py</text>
  <text x="826" y="402" class="tiny">Flask routes and JSON APIs</text>
  <text x="562" y="458" class="mono">static/  -> landing.html, app.html, CSS, JS, assets</text>
  <text x="562" y="484" class="mono">solvers/ -> nqueens.py, sudoku.py</text>

  <rect x="1104" y="180" width="420" height="286" rx="24" fill="url(#panel)" stroke="#324055" stroke-width="2"/>
  <rect x="1126" y="206" width="158" height="34" rx="17" fill="#A6E3A1" opacity="0.18"/>
  <text x="1154" y="228" class="chip">CONTAINER RUNTIME</text>
  <text x="1126" y="282" class="card-title">Running service</text>
  <rect x="1126" y="312" width="176" height="120" rx="18" fill="#0F1522" stroke="#A6E3A1" stroke-width="2"/>
  <text x="1146" y="346" class="body">Image</text>
  <text x="1146" y="376" class="mono">python:3.11-slim</text>
  <text x="1146" y="402" class="tiny">pip install -r requirements.txt</text>
  <rect x="1320" y="312" width="176" height="120" rx="18" fill="#0F1522" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1340" y="346" class="body">Container</text>
  <text x="1340" y="376" class="mono">CMD python app.py</text>
  <text x="1340" y="402" class="tiny">EXPOSE 5000</text>
  <text x="1126" y="458" class="mono">GET  /        -> landing page</text>
  <text x="1126" y="484" class="mono">GET  /app     -> interactive UI</text>

  <rect x="76" y="528" width="692" height="330" rx="24" fill="url(#panel)" stroke="#324055" stroke-width="2"/>
  <rect x="98" y="554" width="184" height="34" rx="17" fill="#8B5CF6" opacity="0.2"/>
  <text x="126" y="576" class="chip">APPLICATION FLOW</text>
  <text x="98" y="630" class="card-title">Request and solver path</text>
  <rect x="98" y="666" width="182" height="132" rx="18" fill="#0F1522" stroke="#5EEAD4" stroke-width="2"/>
  <text x="118" y="704" class="body">Frontend</text>
  <text x="118" y="734" class="tiny">landing.html / app.html</text>
  <text x="118" y="758" class="tiny">script.js / landing.js</text>
  <rect x="330" y="666" width="182" height="132" rx="18" fill="#0F1522" stroke="#8B5CF6" stroke-width="2"/>
  <text x="350" y="704" class="body">Flask API</text>
  <text x="350" y="734" class="tiny">/solve</text>
  <text x="350" y="758" class="tiny">/solve-sudoku</text>
  <rect x="562" y="666" width="182" height="132" rx="18" fill="#0F1522" stroke="#A6E3A1" stroke-width="2"/>
  <text x="582" y="704" class="body">Solvers</text>
  <text x="582" y="734" class="tiny">min_conflit_steps()</text>
  <text x="582" y="758" class="tiny">backtrack_sudoku()</text>
  <line x1="280" y1="732" x2="322" y2="732" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="512" y1="732" x2="554" y2="732" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="554" y1="770" x2="512" y2="770" stroke="#A6E3A1" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="322" y1="770" x2="280" y2="770" stroke="#A6E3A1" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="98" y="828" class="small">The browser sends JSON requests, Flask executes the solver, and the UI replays returned states step by step.</text>

  <rect x="804" y="528" width="720" height="330" rx="24" fill="url(#panel)" stroke="#324055" stroke-width="2"/>
  <rect x="826" y="554" width="176" height="34" rx="17" fill="#5EEAD4" opacity="0.18"/>
  <text x="854" y="576" class="chip">BUILD AND PUBLISH</text>
  <text x="826" y="630" class="card-title">Container lifecycle</text>
  <rect x="826" y="666" width="194" height="132" rx="18" fill="#0F1522" stroke="#5EEAD4" stroke-width="2"/>
  <text x="846" y="704" class="body">Local build</text>
  <text x="846" y="734" class="tiny">Dockerfile + requirements.txt</text>
  <text x="846" y="758" class="tiny">build image for local runs</text>
  <rect x="1068" y="666" width="194" height="132" rx="18" fill="#0F1522" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1088" y="704" class="body">GitHub Actions</text>
  <text x="1088" y="734" class="tiny">.github/workflows/</text>
  <text x="1088" y="758" class="tiny">docker-publish.yml</text>
  <rect x="1310" y="666" width="194" height="132" rx="18" fill="#0F1522" stroke="#A6E3A1" stroke-width="2"/>
  <text x="1330" y="704" class="body">Registry</text>
  <text x="1330" y="734" class="tiny">ghcr.io</text>
  <text x="1330" y="758" class="tiny">version + latest tags</text>
  <line x1="1020" y1="732" x2="1060" y2="732" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1262" y1="732" x2="1302" y2="732" stroke="#8B5CF6" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="826" y="828" class="small">This repository is a single-container application today. There is no compose file yet, so the easiest VS Code path is build, run, inspect logs, and optionally add a dev container later.</text>

  <path d="M496 324H524" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1060 324H1088" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1388 466V512H388V496" stroke="#8B5CF6" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="1220" y="504" class="small">HTTP on localhost:5000</text>

  <rect x="1254" y="94" width="250" height="56" rx="18" fill="#111725" stroke="#324055" stroke-width="2" filter="url(#glow)"/>
  <text x="1280" y="128" class="mono">Current app port: 5000</text>
</svg>
