services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: min-conflit:latest
    container_name: min-conflit-app
    ports:
      - "5000:5000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=5000
      - APP_DEBUG=0
    restart: unless-stopped

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: min-conflit:dev
    container_name: min-conflit-dev
    ports:
      - "5001:5000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=5000
      - APP_DEBUG=1
    volumes:
      - .:/app
    # In development mode, running as root inside the container ensures
    # the Flask hot-reloader and file writing can read/write the mounted
    # host workspace without permission conflicts.
    user: root
